name: gate

# ADR-0002 enforcement teeth: CI runs the single gate runner on every PR.
# Branch protection on `main` should make the `gate` job a required status
# check so a red gate physically blocks merge. The job name is fixed so a runner
# swap (repo variable) never touches branch protection.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    # runs-on is driven by a repo variable (default: free GitHub-hosted runner).
    runs-on: ${{ vars.GATE_RUNNER || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Linux desktop build deps (Tauri/webkit)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Run gate
        run: cargo xtask gate --scope all
